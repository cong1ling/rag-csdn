# Cloudflare Pages 构建配置
# 在 Cloudflare Pages 项目设置中使用

# 构建命令
build_command = "cd rag-bilibili-front && npm install && npm run build"

# 构建输出目录
build_output_directory = "rag-bilibili-front/dist"

# 根目录
root_directory = "/"

# Node.js 版本
[build.environment]
NODE_VERSION = "18"

# 环境变量（在 Cloudflare Pages 控制台中配置）
# VITE_API_BASE_URL = "https://api.yourdomain.com/api"
