spring:
  application:
    name: rag-bilibili-server

  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/rag_bilibili?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    model:
      chat: openai
      embedding: dashscope

    openai:
      api-key: ${OPENAI_API_KEY:sk-8cf67bd33d79423fa59e5d0d0584df93}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: qwen3.6-plus
          temperature: 0.7

    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-ebcacf8f9d554ce39a3a97acc19139df}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024

    alibaba:
      dashvector:
        api-key: ${DASHVECTOR_API_KEY:sk-AcYVrEhz4dEsjktChJ08YvlScUgxl47E53B812E8111F1AA1D7AED2E061B4B}
        endpoint: ${DASHVECTOR_ENDPOINT:vrs-cn-25x4q1th10001u.dashvector.cn-hangzhou.aliyuncs.com}
        collection: bilibili

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.ragbilibili.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:R@g-B1l1b1l1#2024$Xk9mPqZ3nVwL7eJcFhAsDuYtNbOiR5}
  expiration: 604800000  # 7天，单位毫秒

register:
  enabled: true

# CORS 配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.example.ragbilibili: INFO
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
